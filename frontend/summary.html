<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FacultySync — Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a0f1e;--card:rgba(255,255,255,0.04);--card2:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.08);--accent:#4f8ef7;--accent2:#7c5cfc;--text:#e8eaf6;--muted:#8892b0;--success:#43e97b;--error:#ff6b9d;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Space Grotesk',sans-serif;min-height:100vh;background:var(--navy);color:var(--text);}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}
.orb{position:fixed;border-radius:50%;filter:blur(130px);opacity:0.1;pointer-events:none;z-index:0;}
.orb1{width:500px;height:500px;background:var(--success);bottom:-100px;left:-100px;}
.orb2{width:400px;height:400px;background:var(--accent2);top:-100px;right:-100px;}
.topnav{position:sticky;top:0;z-index:100;background:rgba(10,15,30,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.nav-brand{display:flex;align-items:center;gap:10px;font-family:'DM Serif Display',serif;font-size:20px;color:white;}
.nav-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.dot{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:12px;}
.btn-logout{background:rgba(255,107,157,0.1);border:1px solid rgba(255,107,157,0.25);color:#ff6b9d;border-radius:10px;padding:8px 16px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.page{max-width:900px;margin:0 auto;padding:26px 20px;position:relative;z-index:1;}
.page-header{margin-bottom:22px;}
.page-header h1{font-size:24px;font-weight:700;color:white;margin-bottom:3px;}
.page-header p{color:var(--muted);font-size:13px;}
.banner{background:linear-gradient(135deg,rgba(67,233,123,0.08),rgba(79,142,247,0.08));border:1px solid rgba(67,233,123,0.2);border-radius:18px;padding:22px 26px;margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.banner-icon{font-size:42px;}
.banner-text h2{font-size:17px;font-weight:700;color:white;margin-bottom:3px;}
.banner-text p{color:var(--muted);font-size:13px;}
.banner-count{margin-left:auto;background:linear-gradient(135deg,var(--success),#38f9d7);color:#0a1a10;border-radius:50%;width:54px;height:54px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;}
.info-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.info-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 13px;}
.ic-lbl{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.ic-val{color:white;font-weight:600;font-size:13px;}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-bottom:22px;}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:17px;transition:all 0.25s;animation:fi 0.3s ease both;}
.sum-card:hover{border-color:rgba(79,142,247,0.3);transform:translateY(-2px);}
@keyframes fi{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
.sc-num{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:11px;}
.sc-sub{font-size:14px;font-weight:700;color:white;margin-bottom:5px;}
.sc-div{height:1px;background:var(--border);margin:10px 0;}
.sc-lbl{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.sc-fac{font-size:13px;color:var(--success);font-weight:600;}
.act-bar{display:flex;gap:10px;flex-wrap:wrap;}
.btn{padding:12px 18px;border:none;border-radius:12px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.25s;}
.btn-back{background:var(--card2);border:1px solid var(--border);color:var(--text);}
.btn-back:hover{background:rgba(255,255,255,0.07);}
.btn-go{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;flex:1;}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(79,142,247,0.35);}
.btn-clr{background:rgba(255,107,157,0.1);border:1px solid rgba(255,107,157,0.25);color:var(--error);}
.empty-state{text-align:center;padding:56px 20px;color:var(--muted);}
.empty-state .icon{font-size:52px;margin-bottom:12px;opacity:0.4;}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<nav class="topnav">
  <div class="nav-brand"><div class="nav-logo">🎓</div>Faculty<span class="dot">Sync</span></div>
  <div class="nav-right">
    <span style="color:var(--muted);font-size:12px" id="uid"></span>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <h1>Selection Summary</h1>
    <p>Review your faculty selections before generating your timetable</p>
  </div>
  <div id="content"></div>
  <div class="act-bar">
    <button class="btn btn-back" onclick="window.location.href='student.html'">← Back</button>
    <button class="btn btn-go"   onclick="goTT()">View Timetable 🗓️</button>
    <button class="btn btn-clr"  onclick="clearSel()">🗑️ Clear</button>
  </div>
</div>
<script>
const token  = localStorage.getItem("token");
const role   = localStorage.getItem("role");
if (!token || role !== "student") window.location.href = "login.html";

document.getElementById("uid").textContent = localStorage.getItem("userId") || "";

const rawStr = localStorage.getItem("studentSelection");
const raw    = rawStr ? JSON.parse(rawStr) : {};
const sels   = Array.isArray(raw.selections) ? raw.selections : [];
const dept   = raw.department || "";
const year   = raw.year       || "";
const sem    = raw.semester   || "";

const el = document.getElementById("content");

if (!sels.length) {
  el.innerHTML = `<div class="empty-state"><div class="icon">📭</div>
    <h3 style="color:white;font-size:18px;margin-bottom:6px">No selections found</h3>
    <p>Go back and choose faculty.</p></div>`;
} else {
  el.innerHTML = `
    <div class="banner">
      <div class="banner-icon">✅</div>
      <div class="banner-text">
        <h2>Great choices!</h2>
        <p>Faculty selected for ${sels.length} subject${sels.length !== 1 ? "s" : ""}.</p>
      </div>
      <div class="banner-count">${sels.length}</div>
    </div>
    <div class="info-bar">
      <div class="info-chip"><div class="ic-lbl">Department</div><div class="ic-val">${dept || "—"}</div></div>
      <div class="info-chip"><div class="ic-lbl">Year</div><div class="ic-val">${year || "—"}</div></div>
      <div class="info-chip"><div class="ic-lbl">Semester</div><div class="ic-val">${sem || "—"}</div></div>
      <div class="info-chip"><div class="ic-lbl">Student ID</div><div class="ic-val">${localStorage.getItem("userId") || "—"}</div></div>
    </div>
    <div class="sum-grid">
      ${sels.map((it, i) => `
        <div class="sum-card" style="animation-delay:${i * 0.05}s">
          <div class="sc-num">${i + 1}</div>
          <div class="sc-sub">${it.subject}</div>
          <div class="sc-div"></div>
          <div class="sc-lbl">Selected Faculty</div>
          <div class="sc-fac">👨‍🏫 ${it.facultyName}</div>
        </div>`).join("")}
    </div>`;
}

function goTT() {
  if (!sels.length) { alert("No selections."); return; }
  window.location.href = "timetable.html";
}

function clearSel() {
  if (confirm("Clear all selections?")) {
    localStorage.removeItem("studentSelection");
    window.location.reload();
  }
}

function logout() { localStorage.clear(); window.location.href = "login.html"; }
</script>
</body>
</html>
